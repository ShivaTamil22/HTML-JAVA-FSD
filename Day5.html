    <hr>

    <h2> My Task </h2>

    <h4><u>Attribute Type="Range"</u></h4>
    <p>
        <b>
            When the Exact value is less important<br>
            we can Use "RANGE" Attribute
        </b>
    </p>


        <label>Volume : </label>
        <input type="range" min="1" max="100" value="50">

        <label>Brightness : </label>
        <input type="range" min="1" max="100" value="50"> <br>

        <label >Price : </label>
        <input type="range" min="100" max="1000" value="500"> <br>

</body>
